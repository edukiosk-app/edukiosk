<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EduKiosk">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f2044">
<title>EduKiosk</title>
<style>
:root{--nv:#0f2044;--nv2:#1a3260;--gd:#e8a120;--gd2:#f5c85a;--cr:#f5f4f0;--sf:#fff;--bd:#e0dbd2;--tx:#1a1a2e;--mt:#6b6880;--rd:#c0392b;--gn:#1e8449;--pu:#7c3aed;--r:12px;--sh:0 2px 12px rgba(15,32,68,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--cr);color:var(--tx);}
body.kiosk{user-select:none;-webkit-user-select:none;}
input,select,textarea,button{font-family:inherit;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fadein{animation:fadeIn .25s ease}
.tb{height:56px;background:linear-gradient(135deg,var(--nv),var(--nv2));color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.tb-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1.1rem;letter-spacing:-.3px;}
.tb-dot{width:10px;height:10px;border-radius:50%;background:var(--gd);box-shadow:0 0 8px rgba(232,161,32,.6);}
.tb-right{display:flex;align-items:center;gap:10px;}
.bdg{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.b-gd{background:var(--gd);color:var(--nv);}.b-gn{background:#27ae60;color:#fff;}.b-rd{background:var(--rd);color:#fff;}.b-tl{background:#0e7490;color:#fff;}
.tb-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.82rem;transition:background .15s;}
.tb-btn:hover{background:rgba(255,255,255,.25);}
.layout{display:flex;min-height:calc(100vh - 56px);}
.sidebar{width:230px;background:var(--sf);border-right:1px solid var(--bd);padding:1.25rem 0;flex-shrink:0;box-shadow:var(--sh);}
.si{display:flex;align-items:center;gap:10px;padding:10px 1.4rem;cursor:pointer;font-size:.87rem;color:var(--mt);border:none;background:none;width:100%;text-align:left;border-radius:0;transition:all .15s;}
.si:hover{background:var(--cr);color:var(--tx);}
.si.on{background:linear-gradient(90deg,#eef2fa,#f5f7ff);color:var(--nv);font-weight:700;border-right:3px solid var(--nv);}
.main{flex:1;padding:2rem;overflow-y:auto;background:var(--cr);}
.pg{font-size:1.35rem;font-weight:800;color:var(--nv);margin-bottom:1.25rem;}
label{font-size:.76rem;font-weight:700;color:var(--mt);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
input[type=text],input[type=password],input[type=number],select,textarea{width:100%;padding:9px 13px;border:1.5px solid var(--bd);border-radius:9px;font-size:.92rem;color:var(--tx);background:var(--sf);outline:none;margin-bottom:.85rem;transition:border .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--nv);box-shadow:0 0 0 3px rgba(15,32,68,.08);}
textarea{resize:vertical;min-height:80px;}
.btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:.87rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.bn{background:var(--nv);color:#fff;}.bn:hover{background:var(--nv2);transform:translateY(-1px);}
.bg{background:var(--gd);color:var(--nv);}.bg:hover{background:var(--gd2);transform:translateY(-1px);}
.br{background:var(--rd);color:#fff;}.br:hover{opacity:.88;}
.bo{background:transparent;border:1.5px solid var(--bd);color:var(--tx);}.bo:hover{border-color:var(--nv);color:var(--nv);}
.bsm{padding:5px 11px;font-size:.78rem;}.bfull{width:100%;justify-content:center;}
.row{display:flex;gap:10px;align-items:center;}
.merr{background:#fdecea;border:1px solid #f5c2be;color:var(--rd);padding:9px 13px;border-radius:9px;font-size:.84rem;margin-bottom:.85rem;}
.mok{background:#eafaf1;border:1px solid #a9dfbf;color:var(--gn);padding:9px 13px;border-radius:9px;font-size:.84rem;margin-bottom:.85rem;}
.mwarn{background:#fffbe6;border:1px solid #f5c842;color:#7a5c00;padding:9px 13px;border-radius:9px;font-size:.82rem;}
.minfo{background:#e8f4fd;border:1px solid #aed6f1;color:#1a5276;padding:9px 13px;border-radius:9px;font-size:.82rem;}
.card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:1.25rem;margin-bottom:.9rem;box-shadow:var(--sh);transition:box-shadow .15s;}
.card:hover{box-shadow:0 4px 18px rgba(15,32,68,.12);}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.ct{font-weight:700;color:var(--nv);font-size:.97rem;}.cm{font-size:.78rem;color:var(--mt);margin-top:3px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.85rem;margin-bottom:1.25rem;}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1.1rem;text-align:center;box-shadow:var(--sh);}
.sv{font-size:2rem;font-weight:800;color:var(--nv);}.sl{font-size:.72rem;color:var(--mt);text-transform:uppercase;margin-top:2px;}
.tbl{border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;margin-bottom:.9rem;box-shadow:var(--sh);}
table{width:100%;border-collapse:collapse;font-size:.84rem;}
th{background:var(--cr);padding:9px 12px;text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--mt);border-bottom:1px solid var(--bd);font-weight:700;}
td{padding:9px 12px;border-bottom:1px solid var(--bd);}tr:last-child td{border-bottom:none;}tr:hover td{background:#fafaf8;}
.qblock{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:1.1rem;margin-bottom:.9rem;position:relative;box-shadow:var(--sh);}
.qnum{position:absolute;top:-11px;left:14px;background:var(--nv);color:#fff;font-size:.68rem;padding:2px 9px;border-radius:20px;font-weight:700;}
.qtype-bar{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
.qtp{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--cr);font-size:.76rem;font-weight:700;cursor:pointer;color:var(--mt);transition:all .15s;}
.qtp.on{border-color:var(--nv);background:var(--nv);color:#fff;}
.qtp:hover:not(.on){border-color:var(--nv);color:var(--nv);}
.opt-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.opt-row input{margin-bottom:0;flex:1;}
.opt-ltr{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;background:var(--cr);color:var(--mt);flex-shrink:0;cursor:pointer;border:1.5px solid var(--bd);transition:all .15s;}
.opt-ltr.ok{background:var(--gn);color:#fff;border-color:var(--gn);}
.vf-row{display:flex;gap:10px;margin-bottom:.85rem;}
.vf-btn{flex:1;padding:10px;border-radius:9px;border:2px solid var(--bd);cursor:pointer;font-size:.9rem;font-weight:700;background:var(--sf);transition:all .15s;}
.vf-btn.on-v{border-color:var(--gn);background:#eafaf1;color:var(--gn);}
.vf-btn.on-f{border-color:var(--rd);background:#fdecea;color:var(--rd);}
.blank-prev{background:#f0f4ff;border:1px dashed var(--nv);border-radius:9px;padding:.75rem 1rem;font-size:.88rem;line-height:2.2;margin-bottom:.85rem;}
.bhole{display:inline-block;min-width:60px;border-bottom:2px solid var(--nv);margin:0 4px;text-align:center;font-weight:700;color:var(--nv);}
.mpair{display:grid;grid-template-columns:1fr auto 1fr auto;gap:8px;align-items:center;margin-bottom:7px;}
.mpair input{margin-bottom:0;}
.exam-h{background:linear-gradient(135deg,var(--nv),var(--nv2));color:#fff;padding:1.1rem 1.5rem;border-radius:var(--r) var(--r) 0 0;display:flex;align-items:center;gap:1rem;}
.exam-prog{background:rgba(255,255,255,.2);height:6px;border-radius:3px;flex:1;}
.exam-bar{background:var(--gd);height:100%;border-radius:3px;transition:width .3s;}
.exam-body{background:var(--sf);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);padding:1.75rem;}
.q-txt{font-size:1.05rem;font-weight:600;color:var(--nv);margin-bottom:1.25rem;}
.q-note{font-size:.82rem;color:var(--mt);background:var(--cr);padding:8px 12px;border-radius:7px;margin-bottom:1rem;border-left:3px solid var(--nv);}
.opt-btn{width:100%;padding:11px 14px;border:2px solid var(--bd);border-radius:9px;background:var(--sf);text-align:left;cursor:pointer;margin-bottom:8px;font-size:.91rem;display:flex;align-items:center;gap:10px;transition:all .15s;}
.opt-btn:hover{border-color:var(--nv);background:#f0f4ff;transform:translateX(2px);}
.opt-btn.sel{border-color:var(--nv);background:#eef2fa;}.opt-btn.cor{border-color:var(--gn);background:#eafaf1;}.opt-btn.wr{border-color:var(--rd);background:#fdecea;}
.opt-circ{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.binp{display:inline;width:auto;min-width:80px;max-width:160px;margin:0 4px;padding:5px 9px;font-size:.9rem;border-radius:6px;vertical-align:middle;background:#f0f4ff;border:1.5px solid var(--nv);}
.m-ex{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:center;margin-bottom:9px;}
.m-left{background:var(--cr);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;font-weight:600;font-size:.89rem;}
#lock{position:fixed;inset:0;background:#06061a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:#fff;padding:2rem;text-align:center;touch-action:none;display:none;}
.l-icon{font-size:3.5rem;animation:pulse 2s infinite;}
.l-title{font-size:1.8rem;font-weight:800;color:#ff6b6b;}
.l-sub{color:rgba(255,255,255,.6);max-width:340px;font-size:.9rem;line-height:1.6;}
.l-form{display:flex;flex-direction:column;align-items:center;gap:9px;width:100%;max-width:280px;}
.l-inp{text-align:center;letter-spacing:4px;font-size:1.1rem;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:10px;padding:12px;width:100%;outline:none;}
.l-inp:focus{border-color:rgba(255,255,255,.5);}
.infr{background:rgba(255,80,80,.18);border:1px solid rgba(255,80,80,.35);padding:5px 15px;border-radius:20px;font-size:.8rem;color:#ff9090;}
#ssov{position:fixed;inset:0;z-index:8888;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);background:rgba(6,6,26,.75);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:#fff;text-align:center;pointer-events:none;}
.deov{position:fixed;inset:0;background:rgba(6,6,26,.92);z-index:7777;display:none;align-items:center;justify-content:center;padding:1.5rem;touch-action:none;}
.decard{background:var(--sf);border-radius:16px;padding:2rem;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.doc-banner{background:linear-gradient(135deg,var(--nv),var(--nv2));color:#fff;padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-radius:var(--r) var(--r) 0 0;}
.deb{background:rgba(255,80,80,.22);border:1px solid rgba(255,80,80,.45);color:#ffaaaa;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;transition:background .15s;}
.deb:hover{background:rgba(255,80,80,.35);}
.doc-txt{background:var(--sf);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);padding:2rem;line-height:1.8;font-size:.95rem;overflow-y:auto;height:calc(100vh - 104px);}
.doc-txt h2{font-size:1.2rem;font-weight:700;color:var(--nv);margin:1rem 0 .5rem;}
.doc-txt h3{font-size:1rem;font-weight:600;color:var(--nv);margin:.8rem 0 .4rem;}
.doc-if{border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);height:calc(100vh - 104px);background:#1a1a2e;overflow:hidden;}
.doc-if iframe{width:100%;height:100%;border:none;display:block;}
#ac{background:#10101e;color:#8080a0;font-size:.72rem;padding:5px 1.25rem;display:flex;gap:1.25rem;align-items:center;}
.acd{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--sf);border-radius:16px;padding:1.75rem;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto;}
.pin-box{background:linear-gradient(135deg,var(--nv),var(--nv2));border-radius:var(--r);padding:1.25rem;text-align:center;margin-bottom:1rem;}
.pin-num{font-size:2.8rem;font-weight:800;color:var(--gd);letter-spacing:10px;}
.pin-lbl{font-size:.72rem;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:4px;}
.sring{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--nv),var(--nv2));color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 1.25rem;box-shadow:0 4px 20px rgba(15,32,68,.25);}
.sn{font-size:2rem;font-weight:800;}.ss{font-size:.68rem;opacity:.6;}
.rrow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);}
.lbg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1628 0%,#0f2044 40%,#1a3260 100%);padding:1.5rem;}
.lcard{background:var(--sf);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.35);}
.rtabs{display:flex;background:var(--cr);border-radius:9px;padding:4px;margin-bottom:1.35rem;gap:4px;}
.rtab{flex:1;padding:8px;border:none;border-radius:7px;cursor:pointer;font-size:.86rem;font-weight:600;background:transparent;color:var(--mt);transition:all .15s;}
.rtab.on{background:var(--nv);color:#fff;box-shadow:0 2px 8px rgba(15,32,68,.2);}
.ibg{min-height:100vh;background:linear-gradient(135deg,#0a1628,#0f2044,#1a3260);display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.icard{background:var(--sf);border-radius:20px;padding:2.25rem 2rem;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.35);}
.ibadge{background:#eef2fa;border:1.5px solid var(--nv);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1.2rem;}
.dtype-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.dtype-pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--bd);background:var(--cr);font-size:.82rem;font-weight:700;cursor:pointer;color:var(--mt);transition:all .15s;}
.dtype-pill.on{border-color:var(--nv);background:var(--nv);color:#fff;}
.xbanner{background:linear-gradient(135deg,#6d4aff,#26d0ce);border-radius:var(--r);padding:1.25rem;color:#fff;margin-top:1rem;}
.gs{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--bd);align-items:flex-start;}
.gn{width:26px;height:26px;border-radius:50%;background:var(--nv);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;}
.stbar{height:10px;background:var(--cr);border-radius:5px;overflow:hidden;margin-top:6px;}
.stfill{height:100%;border-radius:5px;transition:width .5s;}
.tc{text-align:center;}.tr{text-align:right;}.mt1{margin-top:1rem;}.mb1{margin-bottom:1rem;}

/* ═══ RESPONSIVE SMARTPHONE (max 640px) ═══ */
@media(max-width:640px){
  /* Topbar */
  .tb{padding:0 .85rem;height:52px;}
  .tb-brand{font-size:.95rem;}
  .tb-right{gap:6px;}
  .tb-btn{padding:5px 9px;font-size:.75rem;}
  #sync-status{display:none;}

  /* Layout : sidebar devient nav en bas */
  .layout{flex-direction:column;}
  .sidebar{
    width:100%;border-right:none;border-top:1px solid var(--bd);
    padding:0;order:2;position:sticky;bottom:0;z-index:30;
    display:flex;flex-direction:row;background:var(--sf);
    box-shadow:0 -2px 12px rgba(15,32,68,.1);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .si{
    flex:1;min-width:60px;flex-direction:column;gap:2px;
    padding:8px 4px;font-size:.62rem;text-align:center;
    border-right:1px solid var(--bd);border-radius:0;
  }
  .si.on{border-right:1px solid var(--bd);border-top:3px solid var(--nv);border-bottom:none;}
  .si:last-child{border-right:none;}

  /* Main — empêcher tout débordement horizontal */
  .main{
    padding:1rem .85rem;order:1;
    min-height:calc(100vh - 52px - 57px);
    overflow-x:hidden;width:100%;box-sizing:border-box;
  }
  .pg{font-size:1.1rem;margin-bottom:.85rem;}

  /* Cards */
  .card{padding:.9rem;overflow:hidden;box-sizing:border-box;width:100%;}
  .ch{flex-wrap:wrap;gap:.5rem;overflow:hidden;}
  .ch>div:first-child{min-width:0;overflow:hidden;}
  .ch .row{flex-wrap:wrap;gap:5px;}
  .ct{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

  /* Stats grid */
  .stats{grid-template-columns:repeat(2,1fr);gap:.5rem;}
  .sv{font-size:1.5rem;}

  /* Tableaux — scroll horizontal dans un wrapper */
  .tbl{overflow-x:auto;-webkit-overflow-scrolling:touch;display:block;width:100%;border-radius:var(--r);}
  .tbl table{white-space:nowrap;font-size:.76rem;width:auto;}
  .tbl th,.tbl td{padding:6px 8px!important;}

  /* Table inline dans les cards (infractions home) */
  .card table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;width:100%;font-size:.76rem;}

  /* Formulaires */
  input[type=text],input[type=password],input[type=number],select,textarea{font-size:1rem;}

  /* Test creator : grilles en 1 col */
  .card div[style*="grid-template-columns:2fr 1fr 1fr"]{grid-template-columns:1fr!important;}
  .card div[style*="grid-template-columns:2fr 1fr"]{grid-template-columns:1fr!important;}

  /* Questions : paires correspondance */
  .mpair{grid-template-columns:1fr auto;gap:5px;}

  /* Modal */
  .modal{padding:1.25rem;}

  /* Exam */
  .exam-body{padding:1rem;}
  .exam-h{padding:.75rem 1rem;gap:.5rem;}
  .q-txt{font-size:.97rem;}

  /* Login */
  .lcard{padding:1.75rem 1.25rem;}

  /* Paramètres */
  #api-url-inp{font-size:.72rem!important;}
}</style>

<script>
'use strict';
/* STORAGE LOCAL */
var K={t:'ek_t',d:'ek_d',r:'ek_r',p:'ek_p',s:'ek_s',k:'ek_kiosk',res:'ek_resources'};
function SS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function SL(k,d){try{var r=localStorage.getItem(k);return r===null?d:JSON.parse(r);}catch(e){return d;}}

/* ── SESSIONS ── */
function genCode(){return String(100000+Math.floor(Math.random()*900000));}

function saveSession(sess){
  var sessions=SL(K.s,{});
  sessions[sess.code]=sess;
  SS(K.s,sessions);
}

function saveSessionToCloud(sess,onDone){
  if(!API_URL)return onDone&&onDone(false);
  var meta={
    code:sess.code,type:sess.type,activityId:sess.activityId,
    title:sess.title,subject:sess.subject,exitPin:sess.exitPin,
    created:sess.created,active:sess.active,
    allowResources:!!sess.allowResources,
    showAnswers:sess.showAnswers!==false,
    resources:sess.allowResources?SL(K.res,[]).filter(function(r){return r.defaultOn!==false;}):[]
  };
  // Inclure toujours les données complètes pour que l'élève puisse y accéder
  if(sess.data){meta.data=sess.data;}
  else if(sess.type==='exam'&&sess.activityId){
    var _lt=SL(K.t,[]);
    var _tf=_lt.find(function(x){return String(x.id)===String(sess.activityId);});
    if(_tf)meta.data=_tf;
  } else if(sess.type==='doc'&&sess.activityId){
    var _ld=SL(K.d,[]);
    var _df=_ld.find(function(x){return String(x.id)===String(sess.activityId);});
    if(_df)meta.data=Object.assign({},_df,{exitPin:sess.exitPin});

/* URL ENCODE url-safe base64 */
function enc(o){var r=btoa(unescape(encodeURIComponent(JSON.stringify(o))));return r.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function dec(s){try{var b=s.replace(/-/g,'+').replace(/_/g,'/');var p=b.length%4;if(p)b+='===='.slice(0,4-p);return JSON.parse(decodeURIComponent(escape(atob(b))));}catch(e){return null;}}
function shareUrl(type,obj){return location.origin+location.pathname+'#'+type+'='+enc(obj);}
function urlPayload(){var h=location.hash;if(h.startsWith('#exam='))return{type:'exam',data:dec(h.slice(6))};if(h.startsWith('#doc='))return{type:'doc',data:dec(h.slice(5))};return null;}

/* XML MOODLE */
function parseKahoot(arrayBuffer){
  if(typeof XLSX==='undefined')throw new Error('SheetJS non charge.');
  var wb=XLSX.read(arrayBuffer,{type:'array'});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!rows.length)throw new Error('Fichier vide');

  // Format Kahoot : trouver la ligne d'en-tête contenant "Question"
  var headerIdx=-1;
  for(var i=0;i<Math.min(rows.length,15);i++){
    var row=rows[i];
    for(var j=0;j<row.length;j++){
      var cell=String(row[j]||'').toLowerCase();
      if(cell.indexOf('question')>=0&&cell.indexOf('max')>=0){headerIdx=i;break;}
    }
    if(headerIdx>=0)break;
  }
  if(headerIdx===-1)throw new Error('En-tete Kahoot introuvable. Verifiez le format du fichier.');

  var headers=rows[headerIdx];
  // Trouver les indices des colonnes
  var qIdx=-1,a1=-1,a2=-1,a3=-1,a4=-1,corrIdx=-1;
  for(var k=0;k<headers.length;k++){
    var h=String(headers[k]||'').toLowerCase();
    if(h.indexOf('question')>=0&&qIdx===-1)qIdx=k;
    else if(h.indexOf('answer 1')>=0||h.indexOf('answer1')>=0)a1=k;
    else if(h.indexOf('answer 2')>=0||h.indexOf('answer2')>=0)a2=k;
    else if(h.indexOf('answer 3')>=0||h.indexOf('answer3')>=0)a3=k;
    else if(h.indexOf('answer 4')>=0||h.indexOf('answer4')>=0)a4=k;
    else if(h.indexOf('correct')>=0)corrIdx=k;
  }
  if(qIdx===-1)throw new Error('Colonne Question introuvable.');
  if(a1===-1)throw new Error('Colonne Answer 1 introuvable.');

  var questions=[];
  for(var r=headerIdx+1;r<rows.length;r++){
    var row=rows[r];
    var qText=String(row[qIdx]||'').trim();
    if(!qText||qText==='NaN')continue;

    var opts=[];
    [a1,a2,a3,a4].forEach(function(idx){
      if(idx>=0){var v=String(row[idx]||'').trim();if(v&&v!=='NaN')opts.push(v);}
    });
    if(!opts.length)continue;

    // Bonne réponse : Kahoot utilise "1", "2", "1,2" etc. (1-indexé)
    var corrRaw=String(row[corrIdx]||'').trim();
    var answerIdx=0;
    if(corrRaw){
      // Prendre le premier chiffre (en cas de réponses multiples, prendre la première)
      var firstCorr=corrRaw.split(',')[0].trim();
      var num=parseInt(firstCorr,10);
      if(!isNaN(num)&&num>=1&&num<=opts.length)answerIdx=num-1;
    }

    questions.push({
      id:Date.now()+Math.random(),
      type:'qcm',
      text:qText,
      note:'',
      options:opts,
      answer:answerIdx
    });
  }
  if(!questions.length)throw new Error('Aucune question trouvee dans le fichier.');
  return questions;
}

function parseXML(xmlStr){
  var p=new DOMParser(),doc=p.parseFromString(xmlStr,'text/xml');
  if(doc.querySelector('parsererror'))throw new Error('XML invalide');
  var qs=[];
  doc.querySelectorAll('question').forEach(function(qEl){
    var type=qEl.getAttribute('type');
    if(!type||type==='category')return;
    var text=(qEl.querySelector('questiontext text')||{}).textContent||'';text=text.trim();
    var note=(qEl.querySelector('generalfeedback text')||{}).textContent||'';note=note.trim();
    var id=Date.now()+Math.random();
    if(type==='multichoice'){
      var options=[];var answer=0;
      qEl.querySelectorAll('answer').forEach(function(a,i){
        options.push(((a.querySelector('text')||{}).textContent||'').trim());
        if(parseFloat(a.getAttribute('fraction')||'0')>0)answer=i;
      });
      if(options.length>=2)qs.push({id:id,type:'qcm',text:text,note:note,options:options,answer:answer});
    }else if(type==='truefalse'){
      var answer2=true;
      qEl.querySelectorAll('answer').forEach(function(a){
        var t=((a.querySelector('text')||{}).textContent||'').toLowerCase().trim();
        if((t==='false'||t==='faux')&&parseFloat(a.getAttribute('fraction')||'0')>0)answer2=false;
      });
      qs.push({id:id,type:'vf',text:text,note:note,answer:answer2});
    }else if(type==='shortanswer'){
      var exp=((qEl.querySelector('answer[fraction="100"] text')||{}).textContent||'').trim();
      qs.push({id:id,type:'short',text:text,note:note,expected:exp});
    }else if(type==='matching'){
      var pairs=[];
      qEl.querySelectorAll('subquestion').forEach(function(sq){
        var l=((sq.querySelector('text')||{}).textContent||'').trim();
        var r=((sq.querySelector('answer text')||{}).textContent||'').trim();
        if(l||r)pairs.push({l:l,r:r});
      });
      if(pairs.length>=2)qs.push({id:id,type:'match',text:text,note:note,pairs:pairs});
    }
  });
  return qs;
}

var QTYPES=[{id:'qcm',l:'QCM'},{id:'vf',l:'Vrai/Faux'},{id:'short',l:'Rep. courte'},{id:'blanks',l:'Trous'},{id:'match',l:'Corresp.'}];

function mkQ(type){
  var b={id:Date.now()+Math.random(),type:type,text:'',note:''};
  if(type==='qcm')return Object.assign({},b,{options:['','','',''],answer:0});
  if(type==='vf')return Object.assign({},b,{answer:true});
  if(type==='short')return Object.assign({},b,{expected:''});
  if(type==='blanks')return b;
  if(type==='match')return Object.assign({},b,{text:'Associez',pairs:[{l:'',r:''},{l:'',r:''}]});
  return b;
}

function parseBlanks(text){
  var parts=[],rx=/\[([^\]]+)\]/g,last=0,m;
  while((m=rx.exec(text))!==null){if(m.index>last)parts.push({t:'text',v:text.slice(last,m.index)});parts.push({t:'blank',v:m[1]});last=m.index+m[0].length;}
  if(last<text.length)parts.push({t:'text',v:text.slice(last)});
  return parts;
}

function okBlank(exp,stu){return exp.split('/').map(function(v){return v.trim().toLowerCase();}).indexOf((stu||'').trim().toLowerCase())>=0;}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function mdRender(t){
  if(!t)return'';
  return t.replace(/^# (.+)$/gm,'<h2>$1</h2>').replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
}

function calcScore(questions,answers){
  var total=0,manual=0;
  questions.forEach(function(q){
    var a=answers[q.id];
    if(q.type==='qcm'||q.type==='vf'){total+=(a===q.answer)?1:0;}
    else if(q.type==='short'){if(!q.expected||!q.expected.trim())manual++;else total+=(a||'').trim().toLowerCase()===q.expected.trim().toLowerCase()?1:0;}
    else if(q.type==='blanks'){var bl=parseBlanks(q.text||'').filter(function(p){return p.t==='blank';});if(bl.length){var ok=bl.filter(function(b,i){return okBlank(b.v,(a||{})[i]);}).length;total+=ok/bl.length;}}
    else if(q.type==='match'){var pairs=q.pairs||[];if(pairs.length){var ok2=pairs.filter(function(p,i){return(a||{})[i]===p.r;}).length;total+=ok2/pairs.length;}}
  });
  return{score:Math.round(total*10)/10,max:questions.length,pct:Math.round((total/questions.length)*100),manual:manual};
}

/* WAKE LOCK — empêche la mise en veille pendant une session kiosk */
var _wakeLock=null;
var _showAnswers=true; // contrôle l'affichage des réponses côté élève

function requestWakeLock(){
  // Méthode 1 : Wake Lock API (iOS 16.4+ PWA, Chrome/Edge)
  if('wakeLock' in navigator){
    navigator.wakeLock.request('screen')
      .then(function(wl){
        _wakeLock=wl;
        _wakeLock.addEventListener('release',function(){_wakeLock=null;});
      })
      .catch(function(){_startVideoWakeLock();});
  }else{
    // Méthode 2 : vidéo silencieuse — fonctionne sur tous les navigateurs iOS
    _startVideoWakeLock();
  }
}

function _startVideoWakeLock(){
  if(document.getElementById('ek-wakelock-video'))return;
  try{
    var v=document.createElement('video');
    v.id='ek-wakelock-video';
    v.setAttribute('playsinline','');
    v.setAttribute('muted','');
    v.loop=true;

var _h={
  fs:function(){
    if(!document.fullscreenElement&&!document.webkitFullscreenElement){
      // Tenter de re-rentrer en plein écran immédiatement
      var el=document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el).catch(function(){});
      _lock();
    }
  },
  vis:function(){if(document.hidden)_lock();},
  ssv:function(){if(document.hidden){_hidAt=Date.now();}else{if(_hidAt&&Date.now()-_hidAt<1500)_ss();_hidAt=0;}},
  blur:function(){_lock();},
  key:function(e){
    if(e.key==='Escape'){
      e.preventDefault();
      e.stopImmediatePropagation();
      // Sur iPad, re-demander immédiatement le plein écran avant qu'iOS le quitte
      var el=document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
      _lock();
      return;
    }
    if(e.key==='PrintScreen'||(e.metaKey&&e.shiftKey&&'345'.indexOf(e.key)>=0)||(e.ctrlKey&&e.shiftKey&&e.key==='S')){e.preventDefault();e.stopImmediatePropagation();_ss();return;}
    if((e.altKey&&e.key==='Tab')||(e.ctrlKey&&'wtl'.indexOf(e.key.toLowerCase())>=0)||e.key==='F12'||(e.metaKey&&'wq'.indexOf(e.key)>=0)){e.preventDefault();e.stopImmediatePropagation();_lock();}
  },
  rc:function(e){e.preventDefault();},
  bu:function(e){e.preventDefault();e.returnValue='';},
  ts:function(e){_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},
  tm:function(e){var dx=e.touches[0].clientX-_tx,dy=e.touches[0].clientY-_ty;if((_tx<30||_tx>innerWidth-30)&&Math.abs(dx)>40){e.preventDefault();_lock();}if(_ty<20&&Math.abs(dy)>30){e.preventDefault();_lock();}}
};

function startAC(onLock,onSS,docMode){
  _acActive=true;_infractions=0;_onLock=onLock;_onSS=onSS;
  document.body.classList.add('kiosk');
  var el=document.documentElement;
  (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
  // fullscreenchange → si pas d'overlay instantané déjà visible, déclencher le verrou interne
  document.addEventListener('fullscreenchange',_h.fs);
  document.addEventListener('webkitfullscreenchange',_h.fs);
  document.addEventListener('visibilitychange',_h.vis);
  document.addEventListener('visibilitychange',_h.ssv);
  if(!docMode) window.addEventListener('blur',_h.blur);
  document.addEventListener('keydown',_h.key,{capture:true,passive:false});
  document.addEventListener('contextmenu',_h.rc);
  window.addEventListener('beforeunload',_h.bu);
  document.addEventListener('touchstart',_h.ts,{passive:true});
  document.addEventListener('touchmove',_h.tm,{passive:false});
}

function stopAC(){
  _acActive=false;_onLock=null;_onSS=null;
  document.body.classList.remove('kiosk');
  if(document.fullscreenElement)document.exitFullscreen().catch(function(){});
  document.removeEventListener('fullscreenchange',_h.fs);
  document.removeEventListener('webkitfullscreenchange',_h.fs);
  document.removeEventListener('visibilitychange',_h.vis);
  document.removeEventListener('visibilitychange',_h.ssv);
  window.removeEventListener('blur',_h.blur);
  document.removeEventListener('keydown',_h.key,{capture:true});
  document.removeEventListener('contextmenu',_h.rc);
  window.removeEventListener('beforeunload',_h.bu);
  document.removeEventListener('touchstart',_h.ts);
  document.removeEventListener('touchmove',_h.tm);
}

function showLogin(){
  render(
    '<div class="lbg"><div class="lcard">'
      +'<div class="tc" style="margin-bottom:1.75rem">'
        +'<div id="ek-logo" style="font-size:1.95rem;font-weight:800;color:var(--nv);cursor:default;user-select:none">EduKiosk</div>'
        +'<div style="font-size:.84rem;color:var(--mt);margin-top:3px">Plateforme d\'evaluation securisee</div>'
      +'</div>'
      +'<div id="lerr" style="display:none"></div>'
      +'<label>Prenom et nom</label>'
      +'<input type="text" id="inp-name" placeholder="ex : Marie Dupont" autocomplete="name">'
      +'<label>Classe</label>'
      +'<input type="text" id="inp-cl" placeholder="ex : 3e8" autocomplete="off">'
      +'<label>Code d\'activite</label>'
      +'<input type="text" id="inp-code" placeholder="Code a 6 chiffres" maxlength="6" autocomplete="off" '
        +'style="font-size:1.5rem;letter-spacing:8px;text-align:center;font-weight:700">'
      +'<div id="code-loading" style="display:none;text-align:center;color:var(--mt);font-size:.85rem;margin-top:-.5rem;margin-bottom:.85rem">Recherche de l\'activite...</div>'
      +'<button class="btn bn bfull" id="btn-ok">Commencer</button>'
    +'</div></div>'
  );

  // Geste secret 5 taps sur le logo
  var _taps=0,_tapT=null;
  var _logo=document.getElementById('ek-logo');
  if(_logo){
    _logo.addEventListener('click',function(){
      _taps++;clearTimeout(_tapT);
      if(_taps>=5){_taps=0;showProfLogin();}
      else _tapT=setTimeout(function(){_taps=0;},2000);
    });
  }

  function goStudent(){
    var name=v('#inp-name').trim();
    var cl=v('#inp-cl').trim();
    var code=(v('#inp-code')||'').trim().replace(/\s/g,'');
    if(!name){err.className='merr';err.textContent='Saisissez votre nom.';err.style.display='';return;}
    if(!cl){err.className='merr';err.textContent='Indiquez votre classe.';err.style.display='';return;}
    if(code.length!==6||!/^\d{6}$/.test(code)){err.className='merr';err.textContent='Le code doit contenir 6 chiffres.';err.style.display='';return;}

    var btn=g('#btn-ok');btn.disabled=true;
    var loading=g('#code-loading');if(loading)loading.style.display='';

    // Chercher d'abord en local
    var sess=getSession(code);
    if(sess&&sess.active){
      btn.disabled=false;if(loading)loading.style.display='none';
      if(sess.resources&&sess.resources.length)SS(K.res,sess.resources);
      localStorage.setItem('ek_cur_code',code); // stocker le code courant
      SS(K.k,null);_infractions=0; // remettre à zéro pour nouvelle session
      var localData=Object.assign({},sess.data,{allowResources:!!sess.allowResources,showAnswers:sess.showAnswers!==false});
      runKiosk(localData,sess.type,{name:name,classe:cl});
      return;
    }

    // Chercher dans le cloud via fetch
    if(!API_URL){
      btn.disabled=false;if(loading)loading.style.display='none';
      err.className='merr';err.textContent='Code introuvable. Verifiez le code ou la connexion.';err.style.display='';
      return;
    }

    // Essayer fetch normal puis JSONP
    function tryFetch(){
      fetch((API_URL||'https://withedukiosk.com/api/sheets.php')+(API_URL&&API_URL.indexOf('?')>=0?'&':'?')+'action=getByCode&code='+encodeURIComponent(code)+'&t='+Date.now())
        .then(function(r){return r.json();})
        .then(handleData)
        .catch(function(){tryJsonp();});
    }

    function tryJsonp(){
      var cbName='_ekc'+Date.now();
      var done=false;
      var sc=document.createElement('script');
      window[cbName]=function(data){done=true;delete window[cbName];if(sc.parentNode)sc.parentNode.removeChild(sc);handleData(data);};
      sc.onerror=function(){done=true;delete window[cbName];showErr('Connexion impossible. Verifiez votre reseau.');};
      setTimeout(function(){if(!done){done=true;delete window[cbName];if(sc.parentNode)sc.parentNode.removeChild(sc);showErr('Delai depasse. Reessayez.');}},10000);
      // Utiliser l'URL sans callback — Apps Script retourne JSON directement
      sc.src=(API_URL||'https://withedukiosk.com/api/sheets.php')+(API_URL&&API_URL.indexOf('?')>=0?'&':'?')+'action=getByCode&code='+encodeURIComponent(code)+'&callback='+cbName+'&t='+Date.now();
      document.head.appendChild(sc);
    }

    function handleData(data){
      btn.disabled=false;if(loading)loading.style.display='none';
      if(data&&data.ok&&data.session&&data.session.active){
        var sess=data.session;
        // Stocker les ressources de la session sur cet appareil
        if(sess.resources&&sess.resources.length)SS(K.res,sess.resources);
        // Si la session contient déjà les données complètes, les utiliser directement
        if(!sess.data&&sess.activityId){
          var localTests=SL(K.t,[]);
          var localDocs=SL(K.d,[]);
          if(sess.type==='exam'){
            var t=localTests.find(function(x){return String(x.id)===String(sess.activityId);});
            if(t)sess.data=t;
          }else{
            var d2=localDocs.find(function(x){return String(x.id)===String(sess.activityId);});
            if(d2)sess.data=Object.assign({},d2,{exitPin:sess.exitPin});
          }
        }
        // S'assurer que exitPin est bien dans les données du doc
        if(sess.data&&sess.type==='doc'&&!sess.data.exitPin){
          sess.data=Object.assign({},sess.data,{exitPin:sess.exitPin});
        }
        if(!sess.data){
          showErr('Activite introuvable. Synchronisez EduKiosk en vous connectant en professeur sur cet appareil.');
          return;
        }
        var sessions=SL(K.s,{});sessions[code]=sess;SS(K.s,sessions);
        localStorage.setItem('ek_cur_code',code);
        SS(K.k,null);_infractions=0;
        var finalData=Object.assign({},sess.data,{allowResources:!!sess.allowResources,showAnswers:sess.showAnswers!==false});
        var _student={name:name,classe:cl};
        // Récupérer PIN et code de secours du prof depuis le serveur
        fetch('https://withedukiosk.com/api/sheets.php?action=getSessionData&code='+encodeURIComponent(code))
          .then(function(r){return r.json();})
          .then(function(sd){
            if(sd&&sd.ok){
              if(sd.pin)SS(K.p,sd.pin);
              if(sd.master){SS('ek_master',sd.master);MASTER=sd.master;}
            }
          }).catch(function(){})
          .finally(function(){runKiosk(finalData,sess.type,_student);});
        return;
      }else if(data&&data.session&&!data.session.active){
        showErr('Cette session est terminee.');
      }else{
        showErr('Code introuvable. Verifiez le code aupres de votre professeur.');
      }
    }

    function showErr(msg){
      btn.disabled=false;if(loading)loading.style.display='none';
      err.className='merr';err.textContent=msg;err.style.display='';
    }

    tryFetch();
  }

  g('#btn-ok').onclick=goStudent;
  ['#inp-name','#inp-cl'].forEach(function(s){var el=g(s);if(el)el.onkeydown=function(e){if(e.key==='Enter')goStudent();};});
  var ic=g('#inp-code');
  if(ic){
    ic.oninput=function(){this.value=this.value.replace(/\D/g,'').slice(0,6);};
    ic.onkeydown=function(e){if(e.key==='Enter')goStudent();};
  }

  // Toujours mettre à jour l'URL avec la dernière version
  API_URL='https://withedukiosk.com/api/sheets.php';
  SS('ek_api',API_URL);
  cloudGet(function(){MASTER=SL('ek_master','****');});
}

/* DOC VIEWER */
/* Convertit les liens de partage en URLs intégrables dans une iframe */
function toEmbedUrl(url){
  if(!url)return url;
  // Google Drive : /file/d/ID/view ou /open?id=ID → /file/d/ID/preview
  var gd=url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if(gd)return 'https://drive.google.com/file/d/'+gd[1]+'/preview';
  var gd2=url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if(gd2)return 'https://drive.google.com/file/d/'+gd2[1]+'/preview';
  // Google Docs/Sheets/Slides
  var gdoc=url.match(/docs\.google\.com\/(document|spreadsheets|presentation)\/d\/([^\/\?]+)/);
  if(gdoc)return 'https://docs.google.com/'+gdoc[1]+'/d/'+gdoc[2]+'/preview';
  // OneDrive : remplacer redir par embed
  if(url.includes('onedrive.live.com'))return url.replace('redir?','embed?').replace('view.aspx?','embed.aspx?');
  // Dropbox : dl=0 → raw=1 pour image/pdf direct
  if(url.includes('dropbox.com'))return url.replace('dl=0','raw=1').replace('www.dropbox.com','dl.dropboxusercontent.com');
  // YouTube : convertir watch?v= et youtu.be en /embed/
  var yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt)return 'https://www.youtube.com/embed/'+yt[1]+'?rel=0';
  var yt2=url.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
  if(yt2)return url; // déjà en format embed
  // Genially : view.genially.com → passe tel quel
  if(url.includes('genially.com'))return url;
  // Kahoot : passe tel quel
  if(url.includes('kahoot.it')||url.includes('create.kahoot.it'))return url;
  return url;
}

/* Retourne true si l'URL nécessite un sandbox permissif (scripts, popups, etc.) */
function needsFullSandbox(url){
  return url.includes('genially.com')||url.includes('kahoot.it')||url.includes('wordwall')||url.includes('learningapps')||url.includes('youtube.com')||url.includes('youtu.be');
}

        exitOv.style.display='none';var dur=Math.round((Date.now()-t0)/1000);onClose({type:'doc',docTitle:doc.title,subject:doc.subject,studentName:student.name,classe:student.classe,date:new Date().toLocaleDateString('fr-FR'),duration:dur,infractions:_infractions});
      }else{var ee=exitOv.querySelector('#ee');if(ee){ee.style.display='';setTimeout(function(){ee.style.display='none';},1800);}if(lpin)lpin.value='';}
    }
    var eok=exitOv.querySelector('#eok');if(eok)eok.onclick=tryEx;
    var ecan=exitOv.querySelector('#ecan');if(ecan)ecan.onclick=function(){exitOv.style.display='none';};
    if(pin)pin.onkeydown=function(e){if(e.key==='Enter')tryEx();e.stopPropagation();};
  }

}

/* EXAM */
function runExam(container,exam,student,onDone){
  // Appliquer l'ordre aleatoire si activé
  var questions=exam.shuffle ? shuffle(exam.questions.slice()) : exam.questions.slice();
  var noBack=!!exam.noBack;
  var idx=0,answers={},done=false,timeLeft=exam.duration*60;
  function fmt(s){return String(0|s/60).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function tick(){if(done)return;timeLeft--;if(timeLeft<=0){done=true;showResult();return;}var el=document.getElementById('etimer');if(el){el.textContent=fmt(timeLeft);el.style.color=timeLeft<60?'#ff8080':'#fff';}setTimeout(tick,1000);}
  setTimeout(tick,1000);

  function renderQ(){
    var q=questions[idx],pct=((idx+1)/questions.length*100).toFixed(1);
    var prevBtn=(!noBack&&idx>0)?'<button class="btn bo" id="qprev">Prec.</button>':'<span></span>';
    container.innerHTML='<div style="max-width:640px;margin:0 auto"><div class="exam-h"><div><div style="font-weight:700;font-size:.97rem">'+exam.title+(noBack?' <span style="font-size:.65rem;background:rgba(255,165,0,.3);padding:2px 7px;border-radius:10px;vertical-align:middle">sans retour</span>':'')+'</div><div style="font-size:.76rem;opacity:.7">Q '+(idx+1)+'/'+questions.length+'</div></div><div class="exam-prog"><div class="exam-bar" style="width:'+pct+'%"></div></div><span id="etimer" style="font-weight:700;font-size:1rem;color:#fff;flex-shrink:0">'+fmt(timeLeft)+'</span></div><div class="exam-body"><div class="q-txt">'+(idx+1)+'. '+q.text+'</div>'+(q.note?'<div class="q-note">'+q.note+'</div>':'')+'<div id="qi"></div><div class="row mt1" style="justify-content:space-between">'+prevBtn+(idx<questions.length-1?'<button class="btn bn" id="qnext">Suiv.</button>':'<button class="btn bk" id="qdone">Terminer</button>')+'</div></div></div>';
    renderInput(document.getElementById('qi'),q,answers[q.id],function(val){answers[q.id]=val;},false);
    var qp=document.getElementById('qprev');if(qp)qp.onclick=function(){if(!noBack&&idx>0){idx--;renderQ();}};
    var qn=document.getElementById('qnext');if(qn)qn.onclick=function(){idx++;renderQ();};
    var qd=document.getElementById('qdone');if(qd)qd.onclick=function(){done=true;showResult();};
  }

  function renderInput(wrap,q,ans,onChange,isResult){
    if(!wrap)return;
    if(q.type==='qcm'){
      var html='';
      (q.options||[]).forEach(function(opt,i){
        var cls='opt-btn';if(isResult){cls+=i===q.answer?' cor':ans===i?' wr':'';}else{cls+=ans===i?' sel':'';}
        var bg=isResult?(i===q.answer?'var(--gn)':ans===i?'var(--rd)':'var(--bd)'):(ans===i?'var(--nv)':'var(--bd)');
        var fg=(isResult&&i===q.answer)||(!isResult&&ans===i)?'#fff':'var(--mt)';
        html+='<button class="'+cls+'" data-i="'+i+'"><div class="opt-circ" style="border-color:'+bg+';background:'+bg+';color:'+fg+'">'+String.fromCharCode(65+i)+'</div>'+opt+'</button>';
      });
      wrap.innerHTML=html;
      if(!isResult)wrap.querySelectorAll('.opt-btn').forEach(function(b){b.onclick=function(){onChange(+b.dataset.i);renderQ();};});
    }else if(q.type==='vf'){
      var tv=(ans===true||q.answer===true)&&(isResult||ans===true);var fv=(ans===false||q.answer===false)&&(isResult||ans===false);
      var cT=(!isResult&&ans===true)||(isResult&&q.answer===true),cF=(!isResult&&ans===false)||(isResult&&q.answer===false);
      wrap.innerHTML='<div style="display:flex;gap:12px;margin-bottom:1rem"><button id="vft" style="flex:1;padding:14px;border-radius:10px;border:2px solid '+(cT?'var(--gn)':'var(--bd)')+';cursor:pointer;font-size:1rem;font-weight:700;background:'+(cT?'#eafaf1':'var(--sf)')+';color:'+(cT?'var(--gn)':'var(--tx)')+'">Vrai</button><button id="vff" style="flex:1;padding:14px;border-radius:10px;border:2px solid '+(cF?'var(--rd)':'var(--bd)')+';cursor:pointer;font-size:1rem;font-weight:700;background:'+(cF?'#fdecea':'var(--sf)')+';color:'+(cF?'var(--rd)':'var(--tx)')+'">Faux</button></div>';
      if(!isResult){var vt=wrap.querySelector('#vft'),vf=wrap.querySelector('#vff');if(vt)vt.onclick=function(){onChange(true);renderQ();};if(vf)vf.onclick=function(){onChange(false);renderQ();};}
    }else if(q.type==='short'){
      var ok=isResult&&q.expected?(ans||'').trim().toLowerCase()===q.expected.trim().toLowerCase():null;
      wrap.innerHTML='<input type="text" id="si" placeholder="Votre reponse..." value="'+(ans||'')+'" '+(isResult?'readonly':'')+' style="'+(isResult?'border-color:'+(ok?'var(--gn)':'var(--rd)'):'')+'"><div id="si2"></div>';
      if(!isResult){var si=wrap.querySelector('#si');if(si)si.oninput=function(){onChange(si.value);};}
      var si2=wrap.querySelector('#si2');
      if(isResult&&q.expected&&si2)si2.innerHTML='<div style="font-size:.8rem;color:var(--mt);margin-top:-.4rem">Attendu : <strong>'+q.expected+'</strong></div>';
      if(isResult&&!q.expected&&si2)si2.innerHTML='<div class="mwarn" style="margin-top:.3rem">Correction manuelle.</div>';
    }else if(q.type==='blanks'){
      var parts=parseBlanks(q.text||''),bi=0,html2='<div style="font-size:.97rem;line-height:2.6">';
      parts.forEach(function(p){if(p.t==='text'){html2+=p.v;}else{var i=bi++;var val=(ans||{})[i]||'';var ok2=isResult?okBlank(p.v,val):null;html2+='<input class="binp" data-bi="'+i+'" type="text" value="'+val+'" '+(isResult?'readonly':'')+' style="'+(isResult?'border-color:'+(ok2?'var(--gn)':'var(--rd)')+';background:'+(ok2?'#eafaf1':'#fdecea'):'')+'">'}});
      html2+='</div>';wrap.innerHTML=html2;
      if(!isResult)wrap.querySelectorAll('.binp').forEach(function(inp){inp.oninput=function(){var a=Object.assign({},(answers[q.id]||{}));a[+inp.dataset.bi]=inp.value;onChange(a);};});
    }else if(q.type==='match'){
      var sh=shuffle((q.pairs||[]).map(function(p){return p.r;})),html3='';
      (q.pairs||[]).forEach(function(pair,i){
        var ok3=isResult?(ans||{})[i]===pair.r:null;
        var opts=sh.map(function(o){return '<option value="'+o+'" '+((ans||{})[i]===o?'selected':'')+'>'+o+'</option>';}).join('');
        html3+='<div class="m-ex"><div class="m-left">'+pair.l+'</div><div style="text-align:center;color:var(--mt)">→</div><select data-mi="'+i+'" '+(isResult?'disabled':'')+' style="margin-bottom:0;border-color:'+(isResult?(ok3?'var(--gn)':'var(--rd)'):'var(--bd)')+';background:'+(isResult?(ok3?'#eafaf1':'#fdecea'):'var(--sf)')+'"><option value="">-- Choisir --</option>'+opts+'</select></div>';
      });
      wrap.innerHTML=html3;
      if(!isResult)wrap.querySelectorAll('select').forEach(function(sel){sel.onchange=function(){var a=Object.assign({},(answers[q.id]||{}));a[+sel.dataset.mi]=sel.value;onChange(a);};});
    }
  }

  function showResult(){
    var sc=calcScore(questions,answers);

    // Construire le détail par question
    var breakdown=questions.map(function(q,i){
      var a=answers[q.id],ok=null;
      if(q.type==='qcm'||q.type==='vf')ok=a===q.answer;
      else if(q.type==='short')ok=q.expected?(a||'').trim().toLowerCase()===q.expected.trim().toLowerCase():null;
      else if(q.type==='blanks'){
        var bl=parseBlanks(q.text||'').filter(function(p){return p.t==='blank';});
        if(bl.length){var okb=bl.filter(function(b,i){return okBlank(b.v,(a||{})[i]);}).length;ok=okb===bl.length;}
      }
      else if(q.type==='match'){
        var pairs=q.pairs||[];
        if(pairs.length){var okm=pairs.filter(function(p,pi){return(a||{})[pi]===p.r;}).length;ok=okm===pairs.length;}
      }
      return {
        q:String(q.text||''),type:q.type,
        options:(q.options||[]).map(String),
        answer:q.answer,given:a,ok:ok,
        expected:String(q.expected||''),
        pairs:(q.pairs||[]).map(function(p){return {l:String(p.l||''),r:String(p.r||'')};}),
        blanks:q.type==='blanks'?parseBlanks(q.text||'').filter(function(p){return p.t==='blank';}).map(function(p){return {v:String(p.v||'')};}):[]};    });

    container.innerHTML='<div style="max-width:640px;margin:0 auto">'
      +'<div style="background:'+(sc.pct>=50?'var(--gn)':'var(--rd)')+';color:#fff;padding:1.1rem 1.5rem;border-radius:var(--r) var(--r) 0 0;text-align:center">'
        +'<div style="font-weight:800;font-size:1.05rem">Evaluation terminee</div>'
        +'<div style="font-size:.8rem;opacity:.8;margin-top:2px">'+student.name+' — '+student.classe+'</div>'
      +'</div>'
      +'<div class="exam-body">'
        +'<div class="sring"><div class="sn">'+sc.pct+'%</div><div class="ss">'+sc.score+'/'+sc.max+'</div></div>'
        +(_infractions>0?'<div class="merr">⚠ '+_infractions+' infraction(s).</div>':'')
        +(sc.manual>0?'<div class="mwarn mb1">'+sc.manual+' question(s) a correction manuelle.</div>':'')
        +'<div id="rrows"></div>'
        +'<div class="tc mt1" style="padding:1rem;background:var(--cr);border-radius:8px;font-size:.82rem;color:var(--mt)">Montrez cet ecran a votre professeur.</div>'
        +'<button class="btn bn bfull mt1" id="rbtn">Terminer la session</button>'
      +'</div>'
    +'</div>';

    var rr=document.getElementById('rrows');
    var showAns=_showAnswers;
    if(showAns){
      breakdown.forEach(function(b,i){
      var row=document.createElement('div');
      row.style.cssText='background:var(--sf);border:1.5px solid '+(b.ok===true?'#a9dfbf':b.ok===false?'#f5c2be':'#e0dbd2')+';border-radius:10px;padding:.9rem;margin-bottom:.7rem;';

      // En-tête question
      var html='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:.6rem">'
        +'<span style="font-size:1.1rem;flex-shrink:0">'+(b.ok===true?'✅':b.ok===false?'❌':'📋')+'</span>'
        +'<div style="font-weight:600;font-size:.9rem;color:var(--nv);line-height:1.4">Q'+(i+1)+' — '+b.q+'</div>'
      +'</div>';

      // Options QCM
      if(b.type==='qcm'&&b.options&&b.options.length){
        html+='<div style="display:flex;flex-direction:column;gap:5px">';
        b.options.forEach(function(opt,oi){
          var isCorrect=oi===b.answer;
          var isGiven=oi===b.given;
          var bg=isCorrect?'#eafaf1':isGiven&&!isCorrect?'#fdecea':'var(--cr)';
          var border=isCorrect?'#27ae60':isGiven&&!isCorrect?'#c0392b':'var(--bd)';
          var icon=isCorrect?'✓':isGiven&&!isCorrect?'✗':'';
          html+='<div style="background:'+bg+';border:1.5px solid '+border+';border-radius:7px;padding:6px 10px;font-size:.84rem;display:flex;align-items:center;gap:8px">'
            +(icon?'<span style="font-weight:800;color:'+(isCorrect?'var(--gn)':'var(--rd)')+'">'+icon+'</span>':'<span style="width:16px"></span>')
            +opt
          +'</div>';
        });
        html+='</div>';
      }
      // Vrai/Faux
      else if(b.type==='vf'){
        var corrLabel=b.answer===true?'Vrai':'Faux';
        var givenLabel=b.given===true?'Vrai':b.given===false?'Faux':'—';
        html+='<div style="font-size:.84rem;color:var(--mt)">Votre réponse : <strong style="color:'+(b.ok?'var(--gn)':'var(--rd)')+'">'+givenLabel+'</strong> — Bonne réponse : <strong style="color:var(--gn)">'+corrLabel+'</strong></div>';
      }
      // Réponse courte
      else if(b.type==='short'){
        html+='<div style="font-size:.84rem;color:var(--mt)">Votre réponse : <strong>'+(b.given||'—')+'</strong>'+(b.expected?' — Attendu : <strong style="color:var(--gn)">'+b.expected+'</strong>':'')+'</div>';
      }
      // Texte à trous
      else if(b.type==='blanks'&&b.blanks&&b.blanks.length){
        html+='<div style="display:flex;flex-direction:column;gap:4px">';
        b.blanks.forEach(function(bl,bi){
          var given=(b.given||{})[bi]||'—';
          var isOk=okBlank(bl.v,given);
          html+='<div style="font-size:.83rem;background:'+(isOk?'#eafaf1':'#fdecea')+';border:1px solid '+(isOk?'#27ae60':'#c0392b')+';border-radius:6px;padding:5px 10px">'
            +'Trou '+(bi+1)+' : <strong style="color:'+(isOk?'var(--gn)':'var(--rd)')+'">'+given+'</strong>'
            +(!isOk?' — Attendu : <strong style="color:var(--gn)">'+bl.v+'</strong>':'')
          +'</div>';
        });
        html+='</div>';
      }
      // Correspondances
      else if(b.type==='match'&&b.pairs&&b.pairs.length){
        html+='<div style="display:flex;flex-direction:column;gap:4px">';
        b.pairs.forEach(function(p,pi){
          var given=(b.given||{})[pi]||'—';
          var isOk=given===p.r;
          html+='<div style="font-size:.83rem;background:'+(isOk?'#eafaf1':'#fdecea')+';border:1px solid '+(isOk?'#27ae60':'#c0392b')+';border-radius:6px;padding:5px 10px;display:flex;gap:8px;align-items:center">'
            +'<span style="font-weight:600">'+p.l+'</span>'
            +'<span style="color:var(--mt)">→</span>'
            +'<span style="color:'+(isOk?'var(--gn)':'var(--rd)')+';font-weight:700">'+given+'</span>'
            +(!isOk?'<span style="color:var(--mt)"> (attendu : <strong style="color:var(--gn)">'+p.r+'</strong>)</span>':'')
          +'</div>';
        });
        html+='</div>';
      }

      row.innerHTML=html;
      if(rr)rr.appendChild(row);
    });
    }else if(rr){
      // Sans détails — juste un message neutre
      rr.innerHTML='<div style="background:var(--cr);border-radius:8px;padding:.85rem 1rem;font-size:.84rem;color:var(--mt);text-align:center;margin-bottom:.5rem">Les corrections seront communiquees par votre professeur.</div>';
    }

    var rb=document.getElementById('rbtn');if(rb)rb.onclick=function(){
      var cleanBreakdown=breakdown.map(function(b){
        return {q:b.q,type:b.type,ok:b.ok,given:b.given,answer:b.answer,
                options:b.options||[],expected:b.expected||'',
                pairs:(b.pairs||[]).map(function(p){return {l:p.l,r:p.r};}),
                blanks:(b.blanks||[]).map(function(bl){return {v:bl.v};})};
      });
      var cloudResult={
        score:sc.score,max:sc.max,pct:sc.pct,manual:sc.manual,
        infractions:_infractions,
        studentName:student.name,classe:student.classe,
        testId:exam.id,testTitle:exam.title,subject:exam.subject,
        date:new Date().toLocaleDateString('fr-FR'),
        breakdown:cleanBreakdown
      };
      // Sauvegarder résultat dans K.r
      var all=[].concat(SL(K.r,[]));
      all.push(Object.assign({},cloudResult,{breakdown:cleanBreakdown}));
      try{SS(K.r,all);}catch(e){SS(K.r,[cloudResult]);}
      // Ajouter le code de session pour associer au bon prof
      var _curCode=localStorage.getItem('ek_cur_code')||'';
      if(_curCode)cloudResult.sessionCode=_curCode;
      // Envoyer au cloud
      cloudPost('saveResult',cloudResult);
      // Envoyer le détail des réponses vers Sheets (AnswersDetail)
      if(API_URL&&cleanBreakdown.length){
        var detailPayload={
          studentName:student.name,
          classe:student.classe,
          testTitle:exam.title,
          date:new Date().toLocaleDateString('fr-FR'),
          breakdown:cleanBreakdown
        };
        new Image().src=apiUrl('saveAnswerDetail').replace('&t='+Date.now(),'')+'&data='+encodeURIComponent(JSON.stringify(detailPayload))+'&t='+Date.now();
      }
      onDone(cloudResult);
    };
  }

  renderQ();
}

/* TEACHER */
function showTeacher(){
  // Injecter le token à chaque connexion prof
  var _tok=SL('ek_ptoken','');
  var _base='https://withedukiosk.com/api/sheets.php';
  API_URL=_tok?(_base+'?_token='+encodeURIComponent(_tok)):_base;
  SS('ek_api',_base);
  var tests=SL(K.t,[]),docs=SL(K.d,[]),results=SL(K.r,[]),view='home',creating=null;
  var _sessOpts={}; // stocke les options par test id : {showAnswers, allowRes}
  function svT(){SS(K.t,tests);cloudPost('saveTests',tests);}
  function svD(){SS(K.d,docs);cloudPost('saveDocs',docs);}

  // Nettoyer les sessions expirées au démarrage (plus de 12h)
  var sessions=SL(K.s,{});
  var now=Date.now();
  var cleaned={};
  Object.keys(sessions).forEach(function(k){
    var s=sessions[k];
    // Garder uniquement les sessions actives de moins de 12h
    if(s.active&&(now-s.created)<12*60*60*1000)cleaned[k]=s;
  });
  SS(K.s,cleaned);

  // Stocker l'URL API si pas encore fait
  // Toujours mettre à jour l'URL avec la dernière version
  SS('ek_api','https://withedukiosk.com/api/sheets.php');
  API_URL=_base;
  // Injecter le token dans l'URL
  if(_tok) API_URL=_base+'?_token='+encodeURIComponent(_tok);
  SS('ek_api',_base);

  render('<div id="tb" class="tb"><div class="tb-brand"><div class="tb-dot"></div>EduKiosk <span class="bdg b-gd" style="margin-left:8px">PROF</span></div><div class="tb-right"><span id="sync-status" style="font-size:.75rem;opacity:.8;margin-right:4px"></span><button class="tb-btn" id="tb-sync">&#8635; Sync</button><button class="tb-btn" id="tl">Deconnexion</button></div></div><div class="layout"><div class="sidebar" id="tnav"></div><div class="main" id="tmain"></div></div>');
  var tl=document.getElementById('tl');if(tl)tl.onclick=showLogin;
  var tbs=document.getElementById('tb-sync');if(tbs)tbs.onclick=function(){cloudGet(function(data){
    // cloudGet gère déjà la fusion cloud/local
    // On recharge simplement depuis localStorage après la sync
    tests=SL(K.t,[]);docs=SL(K.d,[]);results=SL(K.r,[]);
    bNav();bMain();
  });};

  // Chargement initial depuis le cloud — toujours priorité au cloud
  cloudGet(function(data){
    if(data&&data.ok){
      // Le cloud est la source de vérité — écraser le localStorage complètement
      tests=data.tests||[];SS(K.t,tests);
      docs=data.docs||[];SS(K.d,docs);
      results=data.results||[];SS(K.r,results);

        .then(function(r){return r.json();})
        .then(function(data){

          var div=document.getElementById('live-content');if(!div)return;

          if(!data.infractions||!data.infractions.length){
            div.innerHTML='<div class="card" style="background:#eafaf1;border-color:#a9dfbf;text-align:center;color:var(--gn);font-weight:600;padding:1.5rem">&#10003; Aucune infraction en cours</div>';

          if(div)div.innerHTML='<div class="card merr">Connexion impossible.</div>';
          if(st)st.textContent='● Erreur';
        });

    loadLive();

      if(view==='live')loadLive();

        .then(function(){loadLive();})
        .catch(function(){loadLive();});
    };
  }

      +'</div>'
      +'<div id="sess-err" style="display:none"></div>'

    // Envoyer au cloud et attendre confirmation
    function trySave(attempt){
      // Mettre à jour le localStorage
      var sessions2=SL(K.s,{});sessions2[sess.code]=sess;SS(K.s,sessions2);
      saveSessionToCloud(sess, function(ok){
        var saving=document.getElementById('sess-saving');
        var area=document.getElementById('sess-code-area');
        var errDiv=document.getElementById('sess-err');
        if(ok){
          if(saving)saving.style.display='none';
          if(area)area.style.display='';
          bNav();bMain();
        }else if(attempt<3){
          var msg=document.getElementById('sess-saving');
          if(msg)msg.textContent='Tentative '+(attempt+1)+'/3...';
          setTimeout(function(){trySave(attempt+1);},2000);
        }else{
          if(saving)saving.style.display='none';
          if(area)area.style.display='';
          if(errDiv){errDiv.className='mwarn';errDiv.innerHTML='&#9888; Session non synchronisee avec le cloud. Le code fonctionne sur cet appareil uniquement.';errDiv.style.display='';}
        }
      });
    }

    if(API_URL){trySave(1);}else{
      var saving=document.getElementById('sess-saving');
      var area=document.getElementById('sess-code-area');
      if(saving)saving.style.display='none';
      if(area)area.style.display='';

      if(errDiv){errDiv.className='mwarn';errDiv.innerHTML='&#9888; Pas de connexion cloud. Le code fonctionne sur cet appareil uniquement.';errDiv.style.display='';}

    bg.onclick=function(e){if(e.target===bg)bg.remove();};

        deactivateSession(code);bg.remove();bNav();bMain();showToast('Session '+code+' arretee.');

    });
  }

  function bQBlock(q,idx,total,onChange,onDel,onMove){
    var div=document.createElement('div');div.className='qblock';
    var html='<div class="qnum">Q'+(idx+1)+' — '+QTYPES.find(function(t){return t.id===q.type;}).l+'</div><div class="qtype-bar">'+QTYPES.map(function(t){return'<div class="qtp'+(q.type===t.id?' on':'')+'" data-qt="'+t.id+'">'+t.l+'</div>';}).join('')+'</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+(idx>0?'<button class="btn bo bsm" data-mv="-1">haut</button>':'')+(idx<total-1?'<button class="btn bo bsm" data-mv="1">bas</button>':'')+'<button class="btn br bsm" data-del>X</button></div>';
    if(q.type!=='blanks')html+='<label>Enonce</label><input type="text" class="qtxt" placeholder="Question..." value="'+((q.text||'').replace(/"/g,'&quot;'))+'">';
    if(q.type==='qcm'){html+='<div style="font-size:.74rem;color:var(--mt);margin-bottom:7px">Cliquez sur la lettre pour la bonne reponse :</div>';(q.options||[]).forEach(function(opt,i){html+='<div class="opt-row"><div class="opt-ltr'+(q.answer===i?' ok':'')+'" data-ol="'+i+'">'+String.fromCharCode(65+i)+'</div><input type="text" class="qopt" data-oi="'+i+'" placeholder="Option '+String.fromCharCode(65+i)+'..." value="'+opt.replace(/"/g,'&quot;')+'">'+(q.options.length>2?'<button class="btn br bsm" data-od="'+i+'">X</button>':'')+'</div>';});if(q.options.length<6)html+='<button class="btn bo bsm" data-ao>+ Option</button>';}
    else if(q.type==='vf')html+='<div class="vf-row"><button class="vf-btn'+(q.answer===true?' on-v':'')+'" data-vf="t">Vrai</button><button class="vf-btn'+(q.answer===false?' on-f':'')+'" data-vf="f">Faux</button></div>';
    else if(q.type==='short')html+='<label>Reponse attendue</label><input type="text" class="qexp" value="'+((q.expected||'').replace(/"/g,'&quot;'))+'">';
    else if(q.type==='blanks'){html+='<label>Syntaxe : [mot]</label><textarea class="qtxtb" style="margin-bottom:.5rem">'+((q.text||''))+'</textarea>';var pp=parseBlanks(q.text||'').filter(function(p){return p.t==='blank';});if(pp.length){html+='<div class="blank-prev">'+parseBlanks(q.text||'').map(function(p){return p.t==='text'?p.v:'<span class="bhole">'+p.v+'</span>';}).join('')+'</div>';}}
    else if(q.type==='match'){html+='<label>Paires :</label>';(q.pairs||[]).forEach(function(p,i){html+='<div class="mpair"><input type="text" class="mpL" data-pi="'+i+'" value="'+p.l.replace(/"/g,'&quot;')+'"><span style="color:var(--mt);font-weight:700;text-align:center">«»</span><input type="text" class="mpR" data-pi="'+i+'" value="'+p.r.replace(/"/g,'&quot;')+'">'+(q.pairs.length>2?'<button class="btn br bsm" data-pd="'+i+'">X</button>':'')+'</div>';});if(q.pairs.length<8)html+='<button class="btn bo bsm mt1" data-ap>+ Paire</button>';}
    html+='<details style="margin-top:8px"><summary style="font-size:.75rem;color:var(--mt);cursor:pointer">+ Note</summary><input type="text" class="qnote" value="'+((q.note||'').replace(/"/g,'&quot;'))+'" style="margin-top:6px"></details>';

    div.innerHTML=html;
    div.querySelectorAll('[data-qt]').forEach(function(el){el.onclick=function(){onChange(mkQ(el.dataset.qt));};});
    var dd=div.querySelector('[data-del]');if(dd)dd.onclick=onDel;
    div.querySelectorAll('[data-mv]').forEach(function(el){el.onclick=function(){onMove(idx,idx+(+el.dataset.mv));};});

    // Mise à jour silencieuse du texte — PAS de rebuildBlocks(), juste update des données
    var qt=div.querySelector('.qtxt');
    if(qt)qt.oninput=function(){q.text=qt.value;};
    var qn=div.querySelector('.qnote');
    if(qn)qn.oninput=function(){q.note=qn.value;};

    if(q.type==='qcm'){
      // Réponse correcte → reconstruction (change l'apparence des lettres)
      div.querySelectorAll('[data-ol]').forEach(function(el){el.onclick=function(){onChange(Object.assign({},q,{text:qt?qt.value:q.text,answer:+el.dataset.ol}));};});
      // Texte des options → silencieux
      div.querySelectorAll('.qopt').forEach(function(inp){inp.oninput=function(){q.options[+inp.dataset.oi]=inp.value;};});
      // Supprimer option → reconstruction
      div.querySelectorAll('[data-od]').forEach(function(el){el.onclick=function(){var i=+el.dataset.od;var opts=q.options.filter(function(_,j){return j!==i;});onChange(Object.assign({},q,{options:opts,answer:q.answer>=i&&q.answer>0?q.answer-1:q.answer}));};});
      var ao=div.querySelector('[data-ao]');if(ao)ao.onclick=function(){onChange(Object.assign({},q,{options:q.options.concat([''])}));};
    }else if(q.type==='vf'){
      div.querySelectorAll('[data-vf]').forEach(function(el){el.onclick=function(){onChange(Object.assign({},q,{answer:el.dataset.vf==='t'}));};});
    }else if(q.type==='short'){
      var qe=div.querySelector('.qexp');if(qe)qe.oninput=function(){q.expected=qe.value;};
    }else if(q.type==='blanks'){
      var qb=div.querySelector('.qtxtb');
      if(qb)qb.oninput=function(){q.text=qb.value;
        // Mettre à jour l'aperçu sans rebuild complet
        var prev=div.querySelector('.blank-prev');
        if(prev){var parts=parseBlanks(q.text||'');prev.innerHTML=parts.map(function(p){return p.t==='text'?p.v:'<span class="bhole">'+p.v+'</span>';}).join('');}
        else if(parseBlanks(q.text||'').filter(function(p){return p.t==='blank';}).length>0){
          var prevDiv=document.createElement('div');prevDiv.className='blank-prev';
          prevDiv.innerHTML=parseBlanks(q.text||'').map(function(p){return p.t==='text'?p.v:'<span class="bhole">'+p.v+'</span>';}).join('');
          qb.parentNode.insertBefore(prevDiv,qb.nextSibling);
        }
      };
    }else if(q.type==='match'){
      div.querySelectorAll('.mpL').forEach(function(inp){inp.oninput=function(){q.pairs[+inp.dataset.pi].l=inp.value;};});
      div.querySelectorAll('.mpR').forEach(function(inp){inp.oninput=function(){q.pairs[+inp.dataset.pi].r=inp.value;};});
      div.querySelectorAll('[data-pd]').forEach(function(el){el.onclick=function(){var pairs=q.pairs.filter(function(_,j){return j!==+el.dataset.pd;});onChange(Object.assign({},q,{pairs:pairs}));};});
      var ap=div.querySelector('[data-ap]');if(ap)ap.onclick=function(){onChange(Object.assign({},q,{pairs:q.pairs.concat([{l:'',r:''}])}));};
    }

    return div;
  }

      }else if(b.type==='short'){
