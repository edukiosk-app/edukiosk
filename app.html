      cloudPost('saveTests',t,check);
      cloudPost('saveDocs',d,check);
      // Envoyer les resultats un par un serait trop lent — on les reecrit tous
      cloudPost('saveResults',r,check);
      cloudPost('savePin',p,check);
    };

    // Bouton PULL : Sheets → local
    var cpull=document.getElementById('cloud-pull');
    if(cpull)cpull.onclick=function(){
      var st=document.getElementById('cloud-status');
      if(st)st.textContent='Telechargement...';
      cpull.disabled=true;
      cloudGet(function(data){
        cpull.disabled=false;
        if(data&&data.ok){
          tests=SL(K.t,[]);docs=SL(K.d,[]);results=SL(K.r,[]);
          bNav();bMain();
          if(st)st.innerHTML='<span style="color:var(--gn)">&#10003; Donnees mises a jour !</span>';
        }else{
          if(st)st.innerHTML='<span style="color:var(--rd)">Erreur - verifiez la connexion.</span>';
        }
      });
    };

    // Gestion des ressources
    function saveResourcesToCloud(resources){
      var cbName='_ek_res_'+Date.now();
      window[cbName]=function(){delete window[cbName];};
      var s=document.createElement('script');
      s.src=(API_URL||SL('ek_api',''))+'?action=saveResources&data='+encodeURIComponent(JSON.stringify(resources))+'&callback='+cbName+'&t='+Date.now();
      document.head.appendChild(s);
    }

    function renderResList(){
      var resources=SL(K.res,[]);
      var rl=document.getElementById('res-list');
      if(!rl)return;
      if(!resources.length){rl.innerHTML='<div style="font-size:.82rem;color:var(--mt)">Aucun site configure.</div>';return;}
      rl.innerHTML=resources.map(function(r,i){
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)">'
          +'<input type="checkbox" class="res-def-chk" data-ri="'+i+'" '+(r.defaultOn!==false?'checked':'')+' style="accent-color:var(--nv);width:16px;height:16px;flex-shrink:0" title="Activer par defaut lors des sessions">'
          +'<div style="flex:1;min-width:0">'
            +'<span style="font-weight:700;font-size:.88rem">'+r.name+'</span>'
            +'<span style="color:var(--mt);font-size:.78rem;margin-left:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block">'+r.url+'</span>'
          +'</div>'
          +'<button class="btn br bsm" data-ri="'+i+'">X</button>'
        +'</div>';
      }).join('');
      // Sauvegarder l'état de la checkbox defaultOn
      rl.querySelectorAll('.res-def-chk').forEach(function(chk){
        chk.onchange=function(){
          var resources=SL(K.res,[]);
          var idx=+chk.dataset.ri;
          if(resources[idx])resources[idx].defaultOn=chk.checked;
          SS(K.res,resources);
          saveResourcesToCloud(resources);
        };
      });
      rl.querySelectorAll('[data-ri]').forEach(function(btn){
        if(btn.tagName==='BUTTON')btn.onclick=function(){
          var resources=SL(K.res,[]);
          resources.splice(+btn.dataset.ri,1);
          SS(K.res,resources);
          saveResourcesToCloud(resources);
          renderResList();
        };
      });
    }
    renderResList();
    var radd=document.getElementById('res-add');
    if(radd)radd.onclick=function(){
      var name=(document.getElementById('res-name')||{}).value||'';
      var url=(document.getElementById('res-url')||{}).value||'';
      var msg=document.getElementById('res-msg');
      if(!name.trim()||!url.trim()){if(msg){msg.className='merr';msg.textContent='Nom et URL requis.';msg.style.display='';}return;}
      if(!url.startsWith('http')){if(msg){msg.className='merr';msg.textContent='URL invalide.';msg.style.display='';}return;}
      var resources=SL(K.res,[]);
      resources.push({name:name.trim(),url:url.trim()});
      SS(K.res,resources);
      // Synchroniser avec Sheets
      var cbName='_ek_res_'+Date.now();
      window[cbName]=function(){delete window[cbName];};
      var sr=document.createElement('script');
      sr.src=(API_URL||SL('ek_api',''))+'?action=saveResources&data='+encodeURIComponent(JSON.stringify(resources))+'&callback='+cbName+'&t='+Date.now();
      document.head.appendChild(sr);
      document.getElementById('res-name').value='';
      document.getElementById('res-url').value='';
      if(msg){msg.className='mok';msg.textContent='Site ajoute !';msg.style.display='';setTimeout(function(){msg.style.display='none';},2000);}
      renderResList();
    };

    var sm=document.getElementById('smaster');
    if(sm)sm.onclick=function(){
      var nv=(document.getElementById('nmaster')||{}).value||'';
      var msg=document.getElementById('mmsg');
      if(nv.length<4){
        if(msg){msg.className='merr';msg.textContent='4 caracteres minimum.';msg.style.display='';}
      }else{
        SS('ek_master',nv);MASTER=nv;
        fetch(apiUrl('saveMaster'),{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({data:nv})
        }).then(function(){}).catch(function(){});
        if(msg){msg.className='mok';msg.style.color='#7a5c00';msg.textContent='Code de secours mis a jour !';msg.style.display='';setTimeout(function(){msg.style.display='none';},3000);}
      }
    };
    var sp=document.getElementById('spin');if(sp)sp.onclick=function(){var nv=v('#npin'),msg=document.getElementById('pmsg');if(nv.length<4){if(msg){msg.className='merr';msg.textContent='4 caracteres minimum.';msg.style.display='';}}else{SS(K.p,nv);cloudPost('savePin',nv);if(msg){msg.className='mok';msg.textContent='Code PIN mis a jour !';msg.style.display='';setTimeout(function(){msg.style.display='none';},3000);}}
    var cpBtn=document.getElementById('btn-chpwd');
    if(cpBtn)cpBtn.onclick=function(){
      var oldP=document.getElementById('old-pwd').value,newP=document.getElementById('new-pwd').value;
      var msg2=document.getElementById('pwd-msg');
      if(!oldP||!newP){msg2.className='merr';msg2.textContent='Remplissez tous les champs.';msg2.style.display='';return;}
      if(newP.length<8){msg2.className='merr';msg2.textContent='8 caracteres minimum.';msg2.style.display='';return;}
      cpBtn.disabled=true;cpBtn.textContent='...';msg2.style.display='none';
      fetch(apiUrl('changePassword'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oldPassword:oldP,newPassword:newP})})
      .then(function(r){return r.json();}).then(function(j){
        msg2.className=j.ok?'mok':'merr';msg2.textContent=j.ok?'Mot de passe mis a jour !':(j.error||'Erreur');
        msg2.style.display='';if(j.ok){document.getElementById('old-pwd').value='';document.getElementById('new-pwd').value='';}
        setTimeout(function(){msg2.style.display='none';},3000);
      }).catch(function(){msg2.className='merr';msg2.textContent='Erreur reseau.';msg2.style.display='';})
      .finally(function(){cpBtn.disabled=false;cpBtn.textContent='Mettre a jour';});
    };};
    var cr=document.getElementById('clr-res');if(cr)cr.onclick=function(){customConfirm('Vider tous les resultats ?',function(){
      results=[];SS(K.r,[]);
      cloudPost('saveResults',[]);
      bMain();showToast('Resultats effaces.');
    });};

    var cs=document.getElementById('clr-sess');if(cs)cs.onclick=function(){customConfirm('Vider toutes les sessions actives ?',function(){
      SS(K.s,{});
      var cbName='_ek_clrs_'+Date.now();
      window[cbName]=function(){delete window[cbName];};
      var s=document.createElement('script');
      s.src=(API_URL||SL('ek_api',''))+'?action=clearSessions&callback='+cbName+'&t='+Date.now();
      document.head.appendChild(s);
      showToast('Sessions videes.');
    });};

    var ca=document.getElementById('clr-ans');if(ca)ca.onclick=function(){customConfirm('Vider toutes les reponses (AnswersDetail) ?',function(){
      var cbName='_ek_clra_'+Date.now();
      window[cbName]=function(){delete window[cbName];showToast('Reponses videes.');};
      var s=document.createElement('script');
      s.src=(API_URL||SL('ek_api',''))+'?action=clearAnswersDetail&callback='+cbName+'&t='+Date.now();
      document.head.appendChild(s);
    });};

    var ci=document.getElementById('clr-infr');if(ci)ci.onclick=function(){customConfirm('Vider les infractions en direct ?',function(){
      var cbName='_ek_clri_'+Date.now();
      window[cbName]=function(){delete window[cbName];showToast('Infractions videes.');};
      var s=document.createElement('script');
      s.src=(API_URL||SL('ek_api',''))+'?action=clearLiveInfractions&callback='+cbName+'&t='+Date.now();
      document.head.appendChild(s);
    });};

  } // fin bSettings

  bNav();bMain();
}

/* STUDENT */
function showStudentHome(user){
  var tests=SL(K.t,[]),docs=SL(K.d,[]),results=SL(K.r,[]),view='tests';
  render('<div id="tb" class="tb"><div class="tb-brand"><div class="tb-dot"></div>EduKiosk</div><div class="tb-right"><span style="opacity:.7;font-size:.82rem">'+user.name+' — '+user.classe+'</span><button class="tb-btn" id="sl">Deconnexion</button></div></div><div class="layout"><div class="sidebar" id="snav"></div><div class="main" id="smain"></div></div>');
  var sl=document.getElementById('sl');if(sl)sl.onclick=showLogin;

  function bNav(){var nav=document.getElementById('snav');if(!nav)return;nav.innerHTML=[{id:'tests',l:'Tests'},{id:'docs',l:'Documents'},{id:'results',l:'Mes resultats'}].map(function(it){return'<button class="si'+(view===it.id?' on':'')+'" data-sv="'+it.id+'">'+it.l+'</button>';}).join('');nav.querySelectorAll('.si').forEach(function(b){b.onclick=function(){view=b.dataset.sv;bNav();bMain();};});}

  function bMain(){var mn=document.getElementById('smain');if(!mn)return;mn.innerHTML='';if(view==='tests')bSTests(mn);else if(view==='docs')bSDocs(mn);else bSRes(mn);}

  function bSTests(mn){mn.innerHTML='<h1 class="pg">Tests disponibles</h1>';var active=tests.filter(function(t){return t.active;});if(!active.length){mn.insertAdjacentHTML('beforeend','<div class="card tc" style="color:var(--mt)">Aucun test disponible.</div>');return;}active.forEach(function(t){var prev=results.find(function(r){return r.testId===t.id&&r.studentName===user.name&&r.classe===user.classe;});var d=document.createElement('div');d.className='card';d.innerHTML='<div class="ch"><div><div class="ct">'+t.title+'</div><div class="cm">'+t.subject+' · '+t.duration+'min · '+t.questions.length+'q</div>'+(prev?'<div style="font-size:.74rem;color:var(--gn);margin-top:3px">Deja passe : '+prev.pct+'%</div>':'')+'</div><button class="btn bn bsm" data-tid="'+t.id+'">Commencer</button></div>';d.querySelector('[data-tid]').onclick=function(){runKiosk(t,'exam',user);};mn.appendChild(d);});}

  function bSDocs(mn){mn.innerHTML='<h1 class="pg">Documents de cours</h1>';if(!docs.length){mn.insertAdjacentHTML('beforeend','<div class="card tc" style="color:var(--mt)">Aucun document.</div>');return;}docs.forEach(function(d){var div=document.createElement('div');div.className='card';div.innerHTML='<div class="ch"><div><div class="ct">'+d.title+'</div><div class="cm">'+d.subject+(d.docType==='link'?' <span class="bdg b-tl" style="font-size:.65rem">Lien</span>':'')+'</div></div><button class="btn bg bsm" data-did="'+d.id+'">Consulter</button></div>';div.querySelector('[data-did]').onclick=function(){runKiosk(Object.assign({},d,{exitPin:SL(K.p,'PROF2024')}),'doc',user);};mn.appendChild(div);});}

  function bSRes(mn){mn.innerHTML='<h1 class="pg">Mes resultats</h1>';var myR=results.filter(function(r){return r.studentName===user.name&&r.classe===user.classe&&r.type!=='doc';});if(!myR.length){mn.insertAdjacentHTML('beforeend','<div class="card tc" style="color:var(--mt)">Aucun resultat.</div>');return;}var wrap=document.createElement('div');wrap.className='tbl';var t=document.createElement('table');t.innerHTML='<thead><tr><th>Test</th><th>Date</th><th>Score</th><th>Infractions</th></tr></thead>';var tb=document.createElement('tbody');[].concat(myR).reverse().forEach(function(r){var tr=document.createElement('tr');var inf=r.infractions||0;tr.innerHTML='<td style="font-weight:600">'+(r.testTitle||'')+'</td><td style="color:var(--mt);font-size:.8rem">'+((r.date&&r.date!=='01/01/1970'?r.date:'—'))+'</td><td><span style="font-weight:700;color:'+(r.pct>=50?'var(--gn)':'var(--rd)')+'">'+r.pct+'%</span></td><td style="color:'+(inf>0?'var(--rd)':'var(--gn)')+'">'+( inf>0?inf+' infr.':'OK')+'</td>';tb.appendChild(tr);});t.appendChild(tb);wrap.appendChild(t);mn.appendChild(wrap);}

  bNav();bMain();
}

/* BOOT */
(function(){
  // Bannière "Ajouter à l'écran d'accueil" sur iOS si pas encore en mode standalone
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent||navigator.platform||'');
  var isStandalone=window.navigator.standalone===true;
  if(isIOS&&!isStandalone){
    var banner=document.createElement('div');
    banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#0f2044;color:#fff;padding:14px 16px;z-index:99999;display:flex;align-items:center;gap:12px;font-size:.85rem;box-shadow:0 -4px 20px rgba(0,0,0,.3);';
    banner.innerHTML='<span style="font-size:1.6rem">📲</span><div style="flex:1"><div style="font-weight:700;margin-bottom:2px">Mode examen — Installation requise</div><div style="opacity:.8;font-size:.78rem">Appuyez sur <strong>&#9633; Partager</strong> → <strong>Sur l\'écran d\'accueil</strong> pour bloquer les onglets</div></div><button onclick="this.parentNode.remove()" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;flex-shrink:0">✕ Plus tard</button>';
    document.body.appendChild(banner);
  }

  // Restaurer session kiosk si l'app a été fermée pendant un examen/document
  var ks=SL(K.k,null);
  if(ks&&ks.payload&&ks.student){
    // Afficher IMMÉDIATEMENT un écran de verrou complet avant tout
    _infractions=(ks.infractions||0)+1;
    var overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:#06061a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:#fff;padding:2rem;text-align:center;';
    overlay.innerHTML='<div style="font-size:3.5rem;animation:pulse 2s infinite">&#128274;</div>'
      +'<div style="font-size:1.8rem;font-weight:800;color:#ff6b6b">SESSION VERROUILLEE</div>'
      +'<div style="color:rgba(255,255,255,.6);max-width:340px;font-size:.9rem">Application fermee pendant la session.</div>'
      +'<div style="background:rgba(255,80,80,.18);border:1px solid rgba(255,80,80,.35);padding:5px 15px;border-radius:20px;font-size:.8rem;color:#ff9090">&#9888; '+_infractions+' infraction(s)</div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;gap:9px;width:100%;max-width:280px;margin-top:.5rem">'
        +'<input type="password" id="restore-pin" maxlength="30" placeholder="Code PIN professeur" autocomplete="new-password" style="text-align:center;letter-spacing:4px;font-size:1.1rem;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:10px;padding:12px;width:100%;outline:none;">'
        +'<div id="restore-err" style="color:#ff8080;font-size:.8rem;display:none">Code incorrect</div>'
        +'<button id="restore-ok" style="width:100%;padding:12px;border:none;border-radius:10px;background:var(--gd);color:var(--nv);font-weight:700;font-size:.95rem;cursor:pointer;">Deverrouiller</button>'
        +'<button id="restore-abort" style="background:transparent;border:none;color:rgba(255,255,255,.3);font-size:.76rem;cursor:pointer;margin-top:4px;">Abandonner la session</button>'
      +'</div>';
    document.body.appendChild(overlay);

    function tryRestorePin(){
      var pin=document.getElementById('restore-pin');
      if(!pin)return;
      if(checkPin(pin.value,SL(K.p,'PROF2024'))){
        overlay.remove();
        runKiosk(ks.payload,ks.type,ks.student);
      }else{
        var er=document.getElementById('restore-err');
        if(er){er.style.display='';setTimeout(function(){er.style.display='none';},1700);}
        pin.value='';
      }
    }
    var rok=document.getElementById('restore-ok');if(rok)rok.onclick=tryRestorePin;
    var rpin=document.getElementById('restore-pin');if(rpin)rpin.onkeydown=function(e){if(e.key==='Enter')tryRestorePin();};
    var rab=document.getElementById('restore-abort');if(rab)rab.onclick=function(){
      SS(K.k,null);overlay.remove();showLogin();
    };
    return;
  }

  var p=urlPayload();
  if(p&&p.data){showIdForm(p.data,p.type,function(student){runKiosk(p.data,p.type,student);});}
  else if(location.hash==='#prof'){showProfLogin();}
  else{showLogin();}
})();
</script></body></html>
